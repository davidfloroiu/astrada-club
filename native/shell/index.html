<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <title>Astrada</title>
    <style>
      :root {
        color-scheme: light;
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        height: 100%;
      }
      body {
        display: grid;
        place-items: center;
        padding: env(safe-area-inset-top) 24px env(safe-area-inset-bottom);
        background: #edebe5;
        color: #1c1c1c;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica,
          Arial, sans-serif;
        -webkit-font-smoothing: antialiased;
        text-align: center;
      }
      .wrap {
        max-width: 320px;
      }
      .mark {
        width: 64px;
        height: 64px;
        margin: 0 auto 20px;
        border-radius: 16px;
        background: #14213d;
        color: #fff;
        display: grid;
        place-items: center;
        font-size: 28px;
        font-weight: 600;
        letter-spacing: 0.02em;
      }
      h1 {
        font-size: 19px;
        font-weight: 600;
        margin: 0 0 8px;
      }
      p {
        font-size: 15px;
        line-height: 1.5;
        color: #5b5b57;
        margin: 0 0 24px;
      }
      button {
        appearance: none;
        border: 0;
        border-radius: 999px;
        background: #14213d;
        color: #fff;
        font-size: 15px;
        font-weight: 500;
        padding: 13px 28px;
        cursor: pointer;
      }
      button:active {
        opacity: 0.85;
      }
    </style>
  </head>
  <body>
    <!--
      Offline / unreachable fallback. The app normally loads astradaclub.com
      (see capacitor.config.ts → server.url); this screen only appears if that
      can't be reached.
    -->
    <div class="wrap">
      <div class="mark">A</div>
      <h1>You're offline</h1>
      <p>Astrada needs a connection to load. Check your network and try again.</p>
      <button onclick="location.replace('https://astradaclub.com')">
        Try again
      </button>
    </div>
  </body>
</html>
